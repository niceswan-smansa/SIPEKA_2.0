name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run test:assets
      - run: npm run test:pwa
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: phase1-public-build-canary
          SUPABASE_SERVICE_ROLE_KEY: phase1-server-only-bundle-canary
      - run: npm run test:bundle
        env:
          SUPABASE_SERVICE_ROLE_KEY: phase1-server-only-bundle-canary

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx supabase start
      - run: npm run db:reset
      - run: npm run test:db
      - run: npm run db:types:check
      - if: always()
        run: npx supabase stop

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx supabase start
      - run: npm run db:reset
      - run: node tools/refresh-local-gateway.mjs
      - run: npm run seed:test-users
      - run: npm run test:e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/**/*.png
          retention-days: 7
      - if: always()
        run: npx supabase stop
